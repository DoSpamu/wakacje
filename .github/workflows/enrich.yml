name: Enrich hotels (TripAdvisor + Booking + YouTube)

on:
  schedule:
    - cron: '0 2 * * *'   # Nightly at 04:00 PL (02:00 UTC)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max hotels to enrich (default: 100)'
        required: false
        default: '100'

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Patchright browser + system deps
        run: pnpm --filter @wakacje/scrapers exec patchright install chromium --with-deps

      - name: Enrich hotels
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SCRAPER_HEADLESS: true
          ENRICHMENT_DELAY_MS: 4000
          NODE_OPTIONS: --use-system-ca
        run: |
          LIMIT="${{ inputs.limit || '100' }}"
          echo "Enriching up to $LIMIT hotels..."
          node --import=tsx/esm src/enrich.ts "$LIMIT"
        working-directory: packages/scrapers
