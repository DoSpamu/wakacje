name: Scrape vacation offers

on:
  schedule:
    - cron: '30 6 * * *'   # Codziennie o 8:30 PL (6:30 UTC)
    - cron: '0 13 * * *'   # I o 15:00 PL (13:00 UTC)
  workflow_dispatch:         # Manualnie z GitHub UI lub API
    inputs:
      providers:
        description: 'Providers to scrape (comma-separated, or "all")'
        required: false
        default: 'all'
      date_from:
        description: 'Date from (YYYY-MM-DD, default: today)'
        required: false
        default: ''
      date_to:
        description: 'Date to (YYYY-MM-DD, default: today+90d)'
        required: false
        default: ''
      enrich_limit:
        description: 'Max hotels to enrich after scrape (0 = skip enrichment step)'
        required: false
        default: '30'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm --filter @wakacje/scrapers exec playwright install chromium --with-deps

      - name: Install Patchright browser
        run: pnpm --filter @wakacje/scrapers exec patchright install chromium

      - name: Cleanup stuck search runs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node --import=tsx/esm -e "
          import('dotenv/config').then(async () => {
            const { createClient } = await import('@supabase/supabase-js');
            const sb = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY);
            const { error, count } = await sb
              .from('search_runs')
              .update({ status: 'failed', error_message: 'Auto-expired: timed out', completed_at: new Date().toISOString() })
              .eq('status', 'running')
              .lt('started_at', new Date(Date.now() - 2 * 3600_000).toISOString())
              .select('id', { count: 'exact', head: true });
            if (error) console.error('Cleanup error:', error.message);
            else console.log('Expired stuck runs:', count ?? 0);
          });
          "
        working-directory: packages/scrapers

      - name: Set date range
        id: dates
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          IN_90=$(date -u -d '+90 days' +%Y-%m-%d)
          echo "date_from=${INPUT_DATE_FROM:-$TODAY}" >> $GITHUB_OUTPUT
          echo "date_to=${INPUT_DATE_TO:-$IN_90}" >> $GITHUB_OUTPUT
        env:
          INPUT_DATE_FROM: ${{ inputs.date_from }}
          INPUT_DATE_TO: ${{ inputs.date_to }}

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_AIRPORTS: KTW,KRK
          SCRAPE_NIGHTS_MIN: 7
          SCRAPE_NIGHTS_MAX: 14
          SCRAPE_ADULTS: 2
          SCRAPE_STARS: 4,5
          SCRAPER_HEADLESS: true
          SCRAPER_DELAY_MS: 2500
          ENABLE_ENRICHMENT: false
          SCRAPE_DATE_FROM: ${{ steps.dates.outputs.date_from }}
          SCRAPE_DATE_TO: ${{ steps.dates.outputs.date_to }}
          # Node.js 24 on Ubuntu: trust system CA certs (needed for some provider SSL certs)
          NODE_OPTIONS: --use-system-ca
        run: |
          PROVIDERS="${{ inputs.providers || 'all' }}"
          node --import=tsx/esm src/run.ts "$PROVIDERS" || true
        working-directory: packages/scrapers

      - name: Enrich hotels (TripAdvisor + YouTube)
        if: ${{ inputs.enrich_limit != '0' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SCRAPER_HEADLESS: true
          ENRICHMENT_DELAY_MS: 4000
        run: |
          LIMIT="${{ inputs.enrich_limit || '30' }}"
          echo "Enriching up to $LIMIT hotels..."
          node --import=tsx/esm src/enrich.ts "$LIMIT" || true
        working-directory: packages/scrapers
